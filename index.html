<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>FlowPad · Planificador ADHD · iPad</title>
    <style>
        :root {
            --bg: #0f0f18;
            --surface: #1a1a28;
            --surface-light: #222236;
            --surface-lighter: #2a2a44;
            --text: #f0eef8;
            --text-secondary: #c5c2da;
            --text-muted: #8a86a6;
            --border: #2e2e4a;
            --border-light: #3c3c5e;
            --lavender: #b8a9d4;
            --lavender-bg: #2a2538;
            --mint: #a0d8c4;
            --mint-bg: #1f2e2a;
            --peach: #f0c8a0;
            --peach-bg: #2e2620;
            --sky: #a0c8e8;
            --sky-bg: #1e2835;
            --rose: #e4b8c4;
            --rose-bg: #2d2228;
            --gold: #e0d0a0;
            --gold-bg: #2d2a1e;
            --today-glow: #4b3f72;
            --today-border: #7b6db8;
            --pomodoro-work: #e8a87c;
            --pomodoro-break: #7cc8a0;
            --danger: #c47070;
            --danger-hover: #d48585;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 6px 22px rgba(0, 0, 0, 0.6);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --font-size-base: 16px;
            --font-size-lg: 1.1rem;
            --font-size-xl: 1.35rem;
            --font-size-sm: 0.85rem;
            --font-size-xs: 0.75rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: var(--font-size-base); scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh; line-height: 1.5; letter-spacing: 0.01em;
            -webkit-font-smoothing: antialiased; overscroll-behavior: none;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        body::-webkit-scrollbar { width: 5px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
            gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); min-height: 60px;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; font-size: var(--font-size-xl); font-weight: 700; color: var(--text); letter-spacing: -0.02em; white-space: nowrap; }
        .header-brand .logo-icon { font-size: 1.4em; }
        .pomodoro-row { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
        .pomodoro-widget { display: flex; align-items: center; gap: 12px; background: var(--surface-light); border-radius: var(--radius-lg); padding: 8px 14px; border: 1px solid var(--border); flex-shrink: 0; }
        .pomodoro-svg { width: 52px; height: 52px; flex-shrink: 0; }
        .pomodoro-svg .track { fill: none; stroke: var(--border-light); stroke-width: 4; }
        .pomodoro-svg .progress { fill: none; stroke: var(--pomodoro-work); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s linear, stroke 0.3s; }
        .pomodoro-svg .progress.break-mode { stroke: var(--pomodoro-break); }
        .pomodoro-time { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; min-width: 56px; text-align: center; letter-spacing: 0.02em; color: var(--text); }
        .pomodoro-label { font-size: var(--font-size-xs); text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); font-weight: 600; text-align: center; }
        .pomodoro-controls { display: flex; gap: 6px; }
        .btn-pomo { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface-lighter); color: var(--text); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); flex-shrink: 0; }
        .btn-pomo:hover { background: var(--border); border-color: var(--text-muted); transform: scale(1.06); }
        .btn-pomo:active { transform: scale(0.92); transition: 0.08s; }
        .btn-pomo.primary { background: var(--today-glow); border-color: var(--today-border); color: #fff; width: 38px; height: 38px; font-size: 1rem; }
        .btn-pomo.primary:hover { background: var(--today-border); box-shadow: 0 0 18px rgba(123, 109, 184, 0.5); }
        .btn-noise { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface-lighter); color: var(--text-muted); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); flex-shrink: 0; }
        .btn-noise.active { background: var(--lavender-bg); border-color: var(--lavender); color: var(--lavender); box-shadow: 0 0 14px rgba(184, 169, 212, 0.3); }
        .btn-noise:hover { border-color: var(--text-muted); transform: scale(1.06); }
        .noise-volume-slider { width: 70px; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; flex-shrink: 0; display: none; }
        .noise-volume-slider.active { display: block; }
        .noise-volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--lavender); border: 2px solid var(--bg); cursor: pointer; }

        .main-container { max-width: 1100px; margin: 0 auto; padding: 14px 16px 50px; display: flex; flex-direction: column; gap: 20px; }

        .pinned-section { background: var(--surface); border-radius: var(--radius-lg); padding: 16px 18px; border: 1px solid var(--border); }
        .pinned-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .pinned-title { font-size: var(--font-size-sm); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .btn-add-note { background: var(--surface-lighter); border: 1px dashed var(--border); color: var(--text-secondary); padding: 7px 16px; border-radius: 18px; cursor: pointer; font-size: var(--font-size-sm); font-weight: 500; transition: all var(--transition); white-space: nowrap; }
        .btn-add-note:hover { border-color: var(--text-muted); color: var(--text); background: var(--border); }
        .pinned-notes-grid { display: flex; gap: 10px; flex-wrap: wrap; min-height: 20px; }
        .pinned-note-empty { color: var(--text-muted); font-size: var(--font-size-sm); font-style: italic; padding: 6px 0; opacity: 0.7; }
        .pinned-note { background: var(--lavender-bg); border: 1px solid rgba(184, 169, 212, 0.3); border-radius: var(--radius); padding: 10px 14px; font-size: var(--font-size-sm); cursor: pointer; transition: all var(--transition); position: relative; max-width: 200px; min-width: 130px; word-break: break-word; box-shadow: var(--shadow); flex-shrink: 0; }
        .pinned-note:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: rgba(184, 169, 212, 0.6); }
        .pinned-note .note-text { line-height: 1.4; font-weight: 500; padding-right: 22px; }
        .pinned-note .note-delete { position: absolute; top: 6px; right: 6px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.7rem; opacity: 0; transition: opacity var(--transition); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .pinned-note:hover .note-delete { opacity: 0.8; }
        .pinned-note .note-delete:hover { opacity: 1; background: rgba(255,255,255,0.1); color: var(--danger); }
        .pinned-note.color-lavender { background: var(--lavender-bg); border-color: rgba(184, 169, 212, 0.35); }
        .pinned-note.color-mint { background: var(--mint-bg); border-color: rgba(160, 216, 196, 0.35); }
        .pinned-note.color-peach { background: var(--peach-bg); border-color: rgba(240, 200, 160, 0.35); }
        .pinned-note.color-sky { background: var(--sky-bg); border-color: rgba(160, 200, 232, 0.35); }
        .pinned-note.color-rose { background: var(--rose-bg); border-color: rgba(228, 184, 196, 0.35); }
        .pinned-note.color-gold { background: var(--gold-bg); border-color: rgba(224, 208, 160, 0.35); }

        .brain-dump-input-wrap { position: relative; }
        .brain-dump-input { width: 100%; padding: 16px 20px; font-size: var(--font-size-lg); font-family: var(--font); background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-lg); color: var(--text); transition: all var(--transition); letter-spacing: 0.01em; resize: none; outline: none; }
        .brain-dump-input::placeholder { color: var(--text-muted); opacity: 0.7; font-style: italic; font-size: var(--font-size-sm); }
        .brain-dump-input:focus { border-color: var(--lavender); box-shadow: 0 0 0 4px rgba(184, 169, 212, 0.1); background: var(--surface-light); }
        .input-hint { position: absolute; bottom: 10px; right: 14px; font-size: var(--font-size-xs); color: var(--text-muted); pointer-events: none; }

        .kanban-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; min-height: 280px; }
        @media (max-width: 767px) { .kanban-grid { grid-template-columns: 1fr; } }
        @media (min-width: 768px) and (max-width: 1024px) { .kanban-grid { grid-template-columns: 1fr 1fr; gap: 14px; } .kanban-column:nth-child(3) { grid-column: span 2; } }
        .kanban-column { background: var(--surface); border-radius: var(--radius-lg); padding: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; transition: border-color var(--transition), box-shadow var(--transition); min-height: 200px; }
        .kanban-column.drag-over { border-color: var(--lavender) !important; box-shadow: 0 0 0 6px rgba(184, 169, 212, 0.08); background: var(--surface-light); }
        .column-header { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: var(--font-size-sm); letter-spacing: 0.02em; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
        .col-brain .column-header { color: var(--lavender); border-bottom-color: rgba(184, 169, 212, 0.4); }
        .col-focus .column-header { color: var(--peach); border-bottom-color: rgba(240, 200, 160, 0.4); }
        .col-done .column-header { color: var(--mint); border-bottom-color: rgba(160, 216, 196, 0.4); }
        .column-count { font-size: var(--font-size-xs); background: var(--surface-lighter); padding: 2px 8px; border-radius: 10px; color: var(--text-muted); font-weight: 500; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; min-height: 50px; flex: 1; }
        .task-item { background: var(--surface-light); border-radius: var(--radius); padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: grab; transition: all var(--transition); border: 1px solid transparent; position: relative; user-select: none; -webkit-user-select: none; font-size: var(--font-size-sm); }
        .task-item:active { cursor: grabbing; }
        .task-item:hover { background: var(--surface-lighter); border-color: var(--border); transform: translateY(-1px); box-shadow: var(--shadow); }
        .task-item.dragging { opacity: 0.4; transform: scale(0.95); border-style: dashed; }
        .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-light); flex-shrink: 0; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: center; background: transparent; font-size: 0.65rem; color: transparent; }
        .task-check:hover { border-color: var(--mint); box-shadow: 0 0 8px rgba(160, 216, 196, 0.3); }
        .task-item.completed .task-check { background: var(--mint-bg); border-color: var(--mint); color: var(--mint); }
        .task-item.completed .task-text { text-decoration: line-through; opacity: 0.45; text-decoration-color: var(--mint); text-decoration-thickness: 2px; }
        .task-text { flex: 1; word-break: break-word; line-height: 1.3; }
        .task-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.7rem; opacity: 0; transition: opacity var(--transition), color var(--transition); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .task-item:hover .task-delete { opacity: 0.7; }
        .task-delete:hover { opacity: 1 !important; color: var(--danger); background: rgba(196, 112, 112, 0.15); }
        .empty-state { text-align: center; color: var(--text-muted); font-size: var(--font-size-sm); padding: 16px 8px; opacity: 0.6; font-style: italic; pointer-events: none; }

        .week-section { background: var(--surface); border-radius: var(--radius-lg); padding: 16px 18px; border: 1px solid var(--border); overflow: hidden; }
        .week-scroll-container { overflow-x: auto; overflow-y: visible; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-bottom: 6px; margin: 0 -18px; padding-left: 18px; padding-right: 18px; }
        .week-scroll-container::-webkit-scrollbar { height: 5px; }
        .week-scroll-container::-webkit-scrollbar-track { background: transparent; }
        .week-scroll-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .week-title { font-size: var(--font-size-sm); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; }
        .week-nav { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-week-nav { background: var(--surface-lighter); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 14px; cursor: pointer; font-size: var(--font-size-xs); transition: all var(--transition); white-space: nowrap; }
        .btn-week-nav:hover { background: var(--border); border-color: var(--text-muted); }
        .btn-week-nav.today-btn { font-weight: 600; border-color: var(--today-border); color: var(--lavender); }
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; min-width: 700px; }
        @media (max-width: 767px) { .week-grid { min-width: 580px; } }
        @media (min-width: 1025px) { .week-scroll-container { overflow-x: visible; margin: 0; padding-left: 0; padding-right: 0; } .week-grid { min-width: auto; } }
        .day-box { background: var(--surface-light); border-radius: var(--radius); padding: 10px 10px; border: 2px solid transparent; transition: all var(--transition); display: flex; flex-direction: column; gap: 5px; min-height: 120px; position: relative; }
        .day-box.today { border-color: var(--today-border) !important; background: var(--today-glow) !important; box-shadow: 0 0 20px rgba(75, 63, 114, 0.45); }
        .day-box.today::after { content: 'HOY'; position: absolute; top: -8px; right: 6px; background: var(--today-border); color: #fff; font-size: 0.55rem; font-weight: 700; padding: 2px 6px; border-radius: 6px; letter-spacing: 0.05em; z-index: 2; }
        .day-box.color-lavender { background: var(--lavender-bg); border-color: rgba(184, 169, 212, 0.4); }
        .day-box.color-mint { background: var(--mint-bg); border-color: rgba(160, 216, 196, 0.4); }
        .day-box.color-peach { background: var(--peach-bg); border-color: rgba(240, 200, 160, 0.4); }
        .day-box.color-sky { background: var(--sky-bg); border-color: rgba(160, 200, 232, 0.4); }
        .day-box.color-rose { background: var(--rose-bg); border-color: rgba(228, 184, 196, 0.4); }
        .day-box.color-gold { background: var(--gold-bg); border-color: rgba(224, 208, 160, 0.4); }
        .day-box.today.color-lavender { background: #3d3558; border-color: var(--lavender); }
        .day-box.today.color-mint { background: #2a3d36; border-color: var(--mint); }
        .day-box.today.color-peach { background: #3d322a; border-color: var(--peach); }
        .day-box.today.color-sky { background: #2a3645; border-color: var(--sky); }
        .day-box.today.color-rose { background: #3d2a32; border-color: var(--rose); }
        .day-box.today.color-gold { background: #3d3828; border-color: var(--gold); }
        .day-header-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
        .day-name { font-weight: 700; font-size: var(--font-size-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .day-box.today .day-name { color: #d5cdf0; }
        .day-date { font-size: 1.2rem; font-weight: 700; color: var(--text); line-height: 1; }
        .day-color-btn { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; background: var(--border); transition: all var(--transition); padding: 0; outline: none; position: relative; }
        .day-color-btn:hover { transform: scale(1.25); border-color: #fff; }
        .day-color-btn.active-color { border-color: #fff; box-shadow: 0 0 6px currentColor; }
        .color-picker-mini { display: none; position: absolute; top: 100%; right: 0; background: var(--surface-lighter); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px; gap: 4px; z-index: 10; flex-wrap: wrap; width: 90px; box-shadow: var(--shadow-lg); }
        .color-picker-mini.show { display: flex; }
        .color-picker-mini .color-dot-mini { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all var(--transition); }
        .color-picker-mini .color-dot-mini:hover { border-color: #fff; transform: scale(1.2); }
        .day-reminders { list-style: none; display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .day-reminder { font-size: var(--font-size-sm); background: rgba(255,255,255,0.05); padding: 5px 8px; border-radius: 5px; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 5px; word-break: break-word; line-height: 1.3; position: relative; border-left: 3px solid var(--lavender); font-weight: 500; }
        .day-reminder .rem-time { font-weight: 700; color: var(--peach); font-size: var(--font-size-xs); white-space: nowrap; min-width: 35px; text-align: right; flex-shrink: 0; }
        .day-reminder .rem-text { flex: 1; font-size: var(--font-size-sm); }
        .day-reminder .rem-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.6rem; opacity: 0; transition: opacity var(--transition); padding: 2px 4px; flex-shrink: 0; }
        .day-reminder:hover .rem-delete { opacity: 0.7; }
        .day-reminder .rem-delete:hover { color: var(--danger); opacity: 1; }
        .day-input-row { display: flex; gap: 4px; margin-top: auto; align-items: center; }
        .day-input-time { width: 38px; padding: 4px 2px; font-size: var(--font-size-xs); font-family: var(--font); background: transparent; border: 1px dashed var(--border); border-radius: 4px; color: var(--text); text-align: center; outline: none; flex-shrink: 0; }
        .day-input-time:focus { border-color: var(--peach); border-style: solid; }
        .day-input-text { flex: 1; padding: 5px 6px; font-size: var(--font-size-sm); font-family: var(--font); background: transparent; border: 1px dashed var(--border); border-radius: 4px; color: var(--text); outline: none; min-width: 0; }
        .day-input-text:focus { border-color: var(--lavender); border-style: solid; background: rgba(184, 169, 212, 0.05); }
        .day-input-text::placeholder, .day-input-time::placeholder { color: var(--text-muted); font-size: var(--font-size-xs); opacity: 0.7; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: var(--surface); border-radius: var(--radius-xl); padding: 22px; border: 1px solid var(--border); width: 92%; max-width: 400px; box-shadow: var(--shadow-lg); animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal h3 { font-size: var(--font-size-lg); margin-bottom: 12px; }
        .modal textarea { width: 100%; padding: 12px; font-size: var(--font-size-sm); font-family: var(--font); background: var(--surface-light); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); resize: vertical; min-height: 70px; outline: none; }
        .modal textarea:focus { border-color: var(--lavender); }
        .color-options { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all var(--transition); flex-shrink: 0; }
        .color-dot:hover { transform: scale(1.18); }
        .color-dot.selected { border-color: #fff; box-shadow: 0 0 12px currentColor; transform: scale(1.1); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-size: var(--font-size-sm); font-weight: 500; transition: all var(--transition); }
        .btn-cancel { background: transparent; color: var(--text-secondary); }
        .btn-cancel:hover { background: var(--surface-lighter); }
        .btn-save { background: var(--today-glow); border-color: var(--today-border); color: #fff; font-weight: 600; }
        .btn-save:hover { background: var(--today-border); box-shadow: 0 0 14px rgba(123,109,184,0.4); }
        .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: rgba(196,112,112,0.15); }

        .export-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 6px 0; align-items: center; }
        .btn-export { background: var(--surface-lighter); border: 1px solid var(--border); color: var(--text-secondary); padding: 7px 16px; border-radius: 18px; cursor: pointer; font-size: var(--font-size-xs); transition: all var(--transition); white-space: nowrap; }
        .btn-export:hover { background: var(--border); color: var(--text); border-color: var(--text-muted); }
        .btn-export.import-btn { border-color: var(--mint); color: var(--mint); }
        .btn-export.import-btn:hover { background: var(--mint-bg); border-color: var(--mint); }
        #importFileInput { display: none; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface-lighter); color: var(--text); padding: 10px 22px; border-radius: 24px; font-size: var(--font-size-sm); border: 1px solid var(--border); z-index: 300; pointer-events: none; opacity: 0; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); box-shadow: var(--shadow-lg); text-align: center; max-width: 85vw; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: var(--mint); color: var(--mint); }

        .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 250; display: flex; align-items: center; justify-content: center; }
        .confirm-box { background: var(--surface); padding: 20px 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); text-align: center; max-width: 340px; box-shadow: var(--shadow-lg); font-size: var(--font-size-sm); }
        .confirm-box p { margin-bottom: 16px; }
        .confirm-box .btn { margin: 0 5px; }

        @keyframes popComplete { 0% { transform: scale(1); } 40% { transform: scale(1.07); } 100% { transform: scale(1); } }
        .task-item.just-completed { animation: popComplete 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand"><span class="logo-icon">🌊</span><span>FlowPad</span></div>
        <div class="pomodoro-row">
            <div class="pomodoro-widget" id="pomodoroWidget">
                <svg class="pomodoro-svg" viewBox="0 0 120 120" id="pomodoroSvg">
                    <circle class="track" cx="60" cy="60" r="50"/>
                    <circle class="progress" id="pomodoroProgress" cx="60" cy="60" r="50"
                    stroke-dasharray="314.16" stroke-dashoffset="0" transform="rotate(-90 60 60)"/>
                </svg>
                <div>
                    <div class="pomodoro-label" id="pomodoroLabel">Enfoque</div>
                    <div class="pomodoro-time" id="pomodoroTime">25:00</div>
                </div>
                <div class="pomodoro-controls">
                    <button class="btn-pomo primary" id="btnPomoStart" title="Iniciar / Pausar">▶</button>
                    <button class="btn-pomo" id="btnPomoReset" title="Reiniciar">↺</button>
                </div>
            </div>
            <button class="btn-noise" id="btnNoise" title="Sonido ambiente">🔇</button>
            <input type="range" class="noise-volume-slider" id="noiseVolumeSlider" min="0" max="100" value="30" title="Volumen ambiente">
            <audio id="cafeAudio" loop preload="auto" style="display:none;">
                <source src="https://physical-blush-uhndbxcpuv.edgeone.app/Sonido%20para%20NO%20ESCUCHAR%20NADA%20%20Aislamiento%20TOTAL%20-%20Cancelación%20de%20RUIDO%20-%20Cámara%20Anecoica.mp3" type="audio/mpeg">
            </audio>
        </div>
    </header>

    <main class="main-container" id="mainContainer">
        <section class="pinned-section" id="pinnedSection">
            <div class="pinned-header">
                <span class="pinned-title">📌 Notas Fijadas</span>
                <button class="btn-add-note" id="btnAddNote">+ Nueva nota</button>
            </div>
            <div class="pinned-notes-grid" id="pinnedNotesGrid">
                <span class="pinned-note-empty">No hay notas fijadas. Crea una para tener recordatorios siempre visibles.</span>
            </div>
        </section>

        <div class="brain-dump-input-wrap">
            <input type="text" class="brain-dump-input" id="brainDumpInput"
            placeholder="🧠 Volcar idea o tarea aquí... Presiona Enter para guardar en Descarga Mental" maxlength="300">
            <span class="input-hint">Enter ↵ para agregar</span>
        </div>

        <div class="kanban-grid" id="kanbanGrid">
            <div class="kanban-column col-brain" data-column="brain-dump" id="colBrainDump">
                <div class="column-header"><span>📥</span> Descarga Mental <span class="column-count" id="countBrainDump">0</span></div>
                <ul class="task-list" id="taskListBrainDump"></ul>
            </div>
            <div class="kanban-column col-focus" data-column="focus-today" id="colFocusToday">
                <div class="column-header"><span>🎯</span> Foco de Hoy <span class="column-count" id="countFocusToday">0</span></div>
                <ul class="task-list" id="taskListFocusToday"></ul>
            </div>
            <div class="kanban-column col-done" data-column="done" id="colDone">
                <div class="column-header"><span>✅</span> Hecho <span class="column-count" id="countDone">0</span></div>
                <ul class="task-list" id="taskListDone"></ul>
            </div>
        </div>

        <section class="week-section" id="weekSection">
            <div class="week-header">
                <span class="week-title">📅 Vista Semanal</span>
                <div class="week-nav">
                    <button class="btn-week-nav" id="btnPrevWeek">← Anterior</button>
                    <button class="btn-week-nav today-btn" id="btnTodayWeek">Semana actual</button>
                    <button class="btn-week-nav" id="btnNextWeek">Siguiente →</button>
                </div>
            </div>
            <div class="week-scroll-container">
                <div class="week-grid" id="weekGrid"></div>
            </div>
        </section>

        <div class="export-bar">
            <button class="btn-export" id="btnCopyClipboard">📋 Copiar resumen</button>
            <button class="btn-export" id="btnDownloadTxt">💾 Exportar datos (.txt)</button>
            <button class="btn-export import-btn" id="btnImportTxt">📥 Importar datos (.txt)</button>
            <input type="file" id="importFileInput" accept=".txt">
            <button class="btn-export" id="btnClearDone" style="color:var(--danger);border-color:transparent;">🗑️ Limpiar Hecho</button>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal" id="modalNote">
            <h3>📌 Nueva Nota Fijada</h3>
            <textarea id="modalNoteText" placeholder="Escribe tu recordatorio importante aquí..." maxlength="250"></textarea>
            <div class="color-options" id="colorOptions">
                <span class="color-dot selected" data-color="lavender" style="background:#b8a9d4;color:#b8a9d4;" title="Lavanda"></span>
                <span class="color-dot" data-color="mint" style="background:#a0d8c4;color:#a0d8c4;" title="Menta"></span>
                <span class="color-dot" data-color="peach" style="background:#f0c8a0;color:#f0c8a0;" title="Melocotón"></span>
                <span class="color-dot" data-color="sky" style="background:#a0c8e8;color:#a0c8e8;" title="Cielo"></span>
                <span class="color-dot" data-color="rose" style="background:#e4b8c4;color:#e4b8c4;" title="Rosa"></span>
                <span class="color-dot" data-color="gold" style="background:#e0d0a0;color:#e0d0a0;" title="Dorado"></span>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="btnModalCancel">Cancelar</button>
                <button class="btn btn-save" id="btnModalSave">Fijar nota</button>
            </div>
        </div>
    </div>

    <div class="confirm-overlay" id="confirmOverlay" style="display:none;">
        <div class="confirm-box">
            <p id="confirmMessage">¿Estás seguro?</p>
            <button class="btn btn-danger" id="btnConfirmYes">Sí, eliminar</button>
            <button class="btn btn-cancel" id="btnConfirmNo">Cancelar</button>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'flowpad_v4_data';
            const POMODORO_KEY = 'flowpad_v4_pomo';
            const WORK_MINUTES = 25;
            const BREAK_MINUTES = 5;
            const CIRCUMFERENCE = 2 * Math.PI * 50;
            const COLORS = ['lavender','mint','peach','sky','rose','gold'];
            const COLOR_HEX = { lavender:'#b8a9d4', mint:'#a0d8c4', peach:'#f0c8a0', sky:'#a0c8e8', rose:'#e4b8c4', gold:'#e0d0a0' };

            const $brainInput = document.getElementById('brainDumpInput');
            const $taskListBrain = document.getElementById('taskListBrainDump');
            const $taskListFocus = document.getElementById('taskListFocusToday');
            const $taskListDone = document.getElementById('taskListDone');
            const $countBrain = document.getElementById('countBrainDump');
            const $countFocus = document.getElementById('countFocusToday');
            const $countDone = document.getElementById('countDone');
            const $pinnedGrid = document.getElementById('pinnedNotesGrid');
            const $weekGrid = document.getElementById('weekGrid');
            const $pomoTime = document.getElementById('pomodoroTime');
            const $pomoLabel = document.getElementById('pomodoroLabel');
            const $pomoProgress = document.getElementById('pomodoroProgress');
            const $btnPomoStart = document.getElementById('btnPomoStart');
            const $btnPomoReset = document.getElementById('btnPomoReset');
            const $btnNoise = document.getElementById('btnNoise');
            const $noiseSlider = document.getElementById('noiseVolumeSlider');
            const $cafeAudio = document.getElementById('cafeAudio');
            const $toast = document.getElementById('toast');
            const $modalOverlay = document.getElementById('modalOverlay');
            const $modalNoteText = document.getElementById('modalNoteText');
            const $colorOptions = document.getElementById('colorOptions');
            const $confirmOverlay = document.getElementById('confirmOverlay');
            const $confirmMessage = document.getElementById('confirmMessage');
            const $importFileInput = document.getElementById('importFileInput');

            let appData = {
                tasks: { 'brain-dump':[], 'focus-today':[], 'done':[] },
                weekDays: {},
                pinnedNotes: [],
            };
            let currentWeekOffset = 0;
            let weekStartDate = null;
            let pomoState = { isRunning:false, isBreak:false, totalSeconds:WORK_MINUTES*60, remainingSeconds:WORK_MINUTES*60, intervalId:null };
            let confirmCallback = null;
            let toastTimeout;

            function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({tasks:appData.tasks, weekDays:appData.weekDays, pinnedNotes:appData.pinnedNotes})); } catch(e){} }
            function loadData() { try { const raw = localStorage.getItem(STORAGE_KEY); if(raw) { const p=JSON.parse(raw); appData.tasks = { 'brain-dump':p.tasks?.['brain-dump']||[], 'focus-today':p.tasks?.['focus-today']||[], 'done':p.tasks?.['done']||[] }; appData.weekDays = p.weekDays||{}; appData.pinnedNotes = p.pinnedNotes||[]; } } catch(e){} }
            function loadPomodoroState() { try { const raw=localStorage.getItem(POMODORO_KEY); if(raw){ const s=JSON.parse(raw); pomoState.isBreak=s.isBreak||false; pomoState.totalSeconds=s.totalSeconds||WORK_MINUTES*60; pomoState.remainingSeconds=s.remainingSeconds??pomoState.totalSeconds; pomoState.isRunning=false; } } catch(e){} }
            function savePomodoroState() { try { localStorage.setItem(POMODORO_KEY, JSON.stringify({isBreak:pomoState.isBreak, totalSeconds:pomoState.totalSeconds, remainingSeconds:pomoState.remainingSeconds})); } catch(e){} }
            function generateId(){ return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).substring(2,8); }

            function showToast(msg, success=true) { clearTimeout(toastTimeout); $toast.textContent=msg; $toast.className='toast '+(success?'success':''); void $toast.offsetWidth; $toast.classList.add('show'); toastTimeout=setTimeout(()=>$toast.classList.remove('show'),2200); }
            function showConfirm(msg, onYes){ $confirmMessage.textContent=msg; $confirmOverlay.style.display='flex'; confirmCallback=onYes; }
            function hideConfirm(){ $confirmOverlay.style.display='none'; confirmCallback=null; }
            document.getElementById('btnConfirmYes').addEventListener('click',()=>{ if(confirmCallback)confirmCallback(); hideConfirm(); });
            document.getElementById('btnConfirmNo').addEventListener('click',hideConfirm);
            $confirmOverlay.addEventListener('click',(e)=>{ if(e.target===$confirmOverlay)hideConfirm(); });

            function createTaskElement(task, columnKey){
                const li=document.createElement('li'); li.className='task-item'+(task.completed?' completed':''); li.draggable=true; li.dataset.id=task.id; li.dataset.source=columnKey; li.dataset.completed=task.completed?'1':'0';
                const checkBtn=document.createElement('button'); checkBtn.className='task-check'; checkBtn.innerHTML=task.completed?'✓':''; checkBtn.title=task.completed?'Desmarcar':'Completar';
                const textSpan=document.createElement('span'); textSpan.className='task-text'; textSpan.textContent=task.text;
                const deleteBtn=document.createElement('button'); deleteBtn.className='task-delete'; deleteBtn.innerHTML='✕'; deleteBtn.title='Eliminar';
                li.appendChild(checkBtn); li.appendChild(textSpan); li.appendChild(deleteBtn);
                checkBtn.addEventListener('click',(e)=>{ e.stopPropagation(); toggleTaskCompletion(task.id,columnKey,li); });
                deleteBtn.addEventListener('click',(e)=>{ e.stopPropagation(); showConfirm('¿Eliminar esta tarea?',()=>deleteTask(task.id,columnKey)); });
                li.addEventListener('dragstart',handleDragStart); li.addEventListener('dragend',handleDragEnd);
                return li;
            }
            function renderKanbanColumn(columnKey){
                let listEl, countEl;
                if(columnKey==='brain-dump'){ listEl=$taskListBrain; countEl=$countBrain; }
                else if(columnKey==='focus-today'){ listEl=$taskListFocus; countEl=$countFocus; }
                else if(columnKey==='done'){ listEl=$taskListDone; countEl=$countDone; }
                else return;
                const tasks=appData.tasks[columnKey]||[]; listEl.innerHTML='';
                if(tasks.length===0){ const emptyLi=document.createElement('li'); emptyLi.className='empty-state'; emptyLi.textContent={ 'brain-dump':'Arrastra tareas aquí o usa el input superior','focus-today':'Prioriza arrastrando desde Descarga Mental','done':'Completa tareas para verlas aquí ✨' }[columnKey]||''; listEl.appendChild(emptyLi); }
                else { tasks.forEach(task=>listEl.appendChild(createTaskElement(task,columnKey))); }
                if(countEl)countEl.textContent=tasks.length;
            }
            function renderAllKanban(){ renderKanbanColumn('brain-dump'); renderKanbanColumn('focus-today'); renderKanbanColumn('done'); }
            function addTask(text, columnKey='brain-dump'){ const task={ id:generateId(), text:text.trim(), completed:false, createdAt:new Date().toISOString() }; if(!appData.tasks[columnKey])appData.tasks[columnKey]=[]; appData.tasks[columnKey].unshift(task); saveData(); renderKanbanColumn(columnKey); return task; }
            function toggleTaskCompletion(taskId,columnKey,liElement){
                const tasks=appData.tasks[columnKey]; if(!tasks)return; const idx=tasks.findIndex(t=>t.id===taskId); if(idx===-1)return; const task=tasks[idx];
                if(columnKey==='done'){ tasks.splice(idx,1); task.completed=false; task.completedAt=null; appData.tasks['brain-dump'].unshift(task); saveData(); renderKanbanColumn('done'); renderKanbanColumn('brain-dump'); showToast('↩️ Tarea restaurada'); }
                else { tasks.splice(idx,1); task.completed=true; task.completedAt=new Date().toISOString(); appData.tasks['done'].unshift(task); saveData(); renderKanbanColumn(columnKey); renderKanbanColumn('done'); setTimeout(()=>{ const el=$taskListDone?.querySelector(`[data-id="${task.id}"]`); if(el){ el.classList.add('just-completed'); setTimeout(()=>el.classList.remove('just-completed'),500); } },50); showToast('✅ ¡Completado! +1 dopamina 🎉'); }
            }
            function deleteTask(taskId,columnKey){ const tasks=appData.tasks[columnKey]; if(!tasks)return; const idx=tasks.findIndex(t=>t.id===taskId); if(idx===-1)return; tasks.splice(idx,1); saveData(); renderKanbanColumn(columnKey); showToast('🗑️ Tarea eliminada'); }
            function moveTask(taskId,fromColumn,toColumn){
                if(fromColumn===toColumn)return; const fromTasks=appData.tasks[fromColumn]; if(!fromTasks)return; const idx=fromTasks.findIndex(t=>t.id===taskId); if(idx===-1)return; const task=fromTasks.splice(idx,1)[0];
                if(toColumn==='done'){ task.completed=true; task.completedAt=new Date().toISOString(); } else if(fromColumn==='done'){ task.completed=false; task.completedAt=null; }
                if(!appData.tasks[toColumn])appData.tasks[toColumn]=[]; appData.tasks[toColumn].unshift(task); saveData(); renderKanbanColumn(fromColumn); renderKanbanColumn(toColumn);
                if(toColumn==='done'){ showToast('✅ ¡Tarea completada!'); setTimeout(()=>{ const el=$taskListDone?.querySelector(`[data-id="${task.id}"]`); if(el){ el.classList.add('just-completed'); setTimeout(()=>el.classList.remove('just-completed'),500); } },50); }
            }
            let draggedTaskId=null, draggedSourceColumn=null;
            function handleDragStart(e){ draggedTaskId=this.dataset.id; draggedSourceColumn=this.dataset.source; this.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',draggedTaskId); const ghost=document.createElement('div'); ghost.style.cssText='width:1px;height:1px;position:absolute;top:-9999px'; document.body.appendChild(ghost); e.dataTransfer.setDragImage(ghost,0,0); setTimeout(()=>document.body.removeChild(ghost),0); }
            function handleDragEnd(e){ this.classList.remove('dragging'); draggedTaskId=null; draggedSourceColumn=null; document.querySelectorAll('.kanban-column').forEach(c=>c.classList.remove('drag-over')); }
            document.querySelectorAll('.kanban-column').forEach(col=>{ col.addEventListener('dragover',(e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; col.classList.add('drag-over'); }); col.addEventListener('dragleave',(e)=>{ if(!col.contains(e.relatedTarget))col.classList.remove('drag-over'); }); col.addEventListener('drop',(e)=>{ e.preventDefault(); col.classList.remove('drag-over'); const taskId=e.dataTransfer.getData('text/plain')||draggedTaskId; const fromCol=draggedSourceColumn; const toCol=col.dataset.column; if(taskId&&fromCol&&toCol&&fromCol!==toCol)moveTask(taskId,fromCol,toCol); draggedTaskId=null; draggedSourceColumn=null; }); });

            function renderPinnedNotes(){ $pinnedGrid.innerHTML=''; if(appData.pinnedNotes.length===0){ $pinnedGrid.innerHTML='<span class="pinned-note-empty">No hay notas fijadas. Crea una para tener recordatorios siempre visibles.</span>'; } else { appData.pinnedNotes.forEach(note=>{ const el=document.createElement('div'); el.className='pinned-note color-'+(note.color||'lavender'); el.innerHTML=`<span class="note-text">${escapeHtml(note.text)}</span><button class="note-delete" data-note-id="${note.id}" title="Eliminar">✕</button>`; el.querySelector('.note-delete').addEventListener('click',(e)=>{ e.stopPropagation(); showConfirm('¿Eliminar esta nota?',()=>removePinnedNote(note.id)); }); el.addEventListener('click',(e)=>{ if(e.target.classList.contains('note-delete'))return; const newText=prompt('Editar nota:',note.text); if(newText!==null&&newText.trim()!==''){ note.text=newText.trim(); saveData(); renderPinnedNotes(); } else if(newText!==null&&newText.trim()===''){ showConfirm('¿Eliminar nota? (texto vacío)',()=>removePinnedNote(note.id)); } }); $pinnedGrid.appendChild(el); }); } }
            function addPinnedNote(text,color){ appData.pinnedNotes.unshift({ id:generateId(), text:text.trim(), color:color||'lavender', createdAt:new Date().toISOString() }); saveData(); renderPinnedNotes(); showToast('📌 Nota fijada'); }
            function removePinnedNote(noteId){ appData.pinnedNotes=appData.pinnedNotes.filter(n=>n.id!==noteId); saveData(); renderPinnedNotes(); showToast('🗑️ Nota eliminada'); }
            function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

            let selectedNoteColor='lavender';
            function openNoteModal(){ $modalNoteText.value=''; selectedNoteColor='lavender'; updateColorSelection(); $modalOverlay.style.display='flex'; $modalNoteText.focus(); }
            function closeNoteModal(){ $modalOverlay.style.display='none'; $modalNoteText.value=''; }
            function updateColorSelection(){ document.querySelectorAll('#colorOptions .color-dot').forEach(d=>d.classList.toggle('selected',d.dataset.color===selectedNoteColor)); }
            $colorOptions.addEventListener('click',(e)=>{ const dot=e.target.closest('.color-dot'); if(!dot)return; selectedNoteColor=dot.dataset.color; updateColorSelection(); });
            document.getElementById('btnModalSave').addEventListener('click',()=>{ const text=$modalNoteText.value.trim(); if(!text){ showToast('⚠️ Escribe algo',false); return; } addPinnedNote(text,selectedNoteColor); closeNoteModal(); });
            document.getElementById('btnModalCancel').addEventListener('click',closeNoteModal);
            $modalOverlay.addEventListener('click',(e)=>{ if(e.target===$modalOverlay)closeNoteModal(); });
            document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'&&$modalOverlay.style.display==='flex')closeNoteModal(); if(e.key==='Escape'&&$confirmOverlay.style.display==='flex')hideConfirm(); });

            function getMondayOfWeek(date){ const d=new Date(date); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1); d.setDate(diff); d.setHours(0,0,0,0); return d; }
            function updateWeekStartDate(){ const now=new Date(); const base=getMondayOfWeek(now); base.setDate(base.getDate()+currentWeekOffset*7); weekStartDate=base; }
            function getWeekDays(){ updateWeekStartDate(); const days=[]; for(let i=0;i<7;i++){ const d=new Date(weekStartDate); d.setDate(d.getDate()+i); days.push(d); } return days; }
            function formatDateKey(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }
            function isToday(date){ const t=new Date(); return date.getFullYear()===t.getFullYear()&&date.getMonth()===t.getMonth()&&date.getDate()===t.getDate(); }
            function getDayData(dateKey){ if(!appData.weekDays[dateKey])appData.weekDays[dateKey]={color:null,reminders:[]}; return appData.weekDays[dateKey]; }
            function renderWeekView(){
                const days=getWeekDays(); $weekGrid.innerHTML=''; const dayNames=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
                days.forEach((day,i)=>{ const dateKey=formatDateKey(day); const dayData=getDayData(dateKey); const dayIndex=day.getDay()===0?6:day.getDay()-1; const todayClass=isToday(day)?' today':''; const colorClass=dayData.color?' color-'+dayData.color:''; const box=document.createElement('div'); box.className='day-box'+todayClass+colorClass; box.dataset.dateKey=dateKey;
                    let remindersHtml=''; (dayData.reminders||[]).forEach(rem=>{ const timeStr=rem.time?`<span class="rem-time">${escapeHtml(rem.time)}</span>`:''; remindersHtml+=`<li class="day-reminder">${timeStr}<span class="rem-text">${escapeHtml(rem.text)}</span><button class="rem-delete" data-rem-id="${rem.id}" data-date-key="${dateKey}" title="Eliminar">✕</button></li>`; });
                    box.innerHTML=`<div class="day-header-row"><span class="day-name">${dayNames[dayIndex]}</span><span class="day-date">${day.getDate()}</span><div style="position:relative;flex-shrink:0;"><button class="day-color-btn${dayData.color?' active-color':''}" data-date-key="${dateKey}" style="background:${dayData.color?COLOR_HEX[dayData.color]:'var(--border)'};color:${dayData.color?COLOR_HEX[dayData.color]:'var(--border)'}" title="Color del día"></button><div class="color-picker-mini" data-date-key="${dateKey}">${COLORS.map(c=>`<span class="color-dot-mini" data-color="${c}" style="background:${COLOR_HEX[c]};color:${COLOR_HEX[c]}" title="${c}"></span>`).join('')}<span class="color-dot-mini" data-color="" style="background:var(--border);border:1px dashed var(--text-muted);" title="Sin color">✕</span></div></div></div><ul class="day-reminders">${remindersHtml||''}</ul><div class="day-input-row"><input type="text" class="day-input-time" placeholder="hh:mm" data-date-key="${dateKey}" maxlength="5" title="Hora (opcional)"><input type="text" class="day-input-text" placeholder="+ recordatorio" data-date-key="${dateKey}" maxlength="150"></div>`;
                    $weekGrid.appendChild(box); });
                $weekGrid.querySelectorAll('.day-color-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const picker=btn.nextElementSibling; document.querySelectorAll('.color-picker-mini.show').forEach(p=>{ if(p!==picker)p.classList.remove('show'); }); picker.classList.toggle('show'); }); });
                $weekGrid.querySelectorAll('.color-dot-mini').forEach(dot=>{ dot.addEventListener('click',(e)=>{ e.stopPropagation(); const picker=dot.closest('.color-picker-mini'); const dateKey=picker.dataset.dateKey; const color=dot.dataset.color||null; getDayData(dateKey).color=color; saveData(); renderWeekView(); }); });
                $weekGrid.querySelectorAll('.day-input-text').forEach(input=>{ input.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); const dateKey=input.dataset.dateKey; const text=input.value.trim(); if(text){ const timeInput=input.parentElement.querySelector('.day-input-time'); const time=timeInput?timeInput.value.trim():''; addWeekReminder(dateKey,text,time||null); input.value=''; if(timeInput)timeInput.value=''; } } }); });
                $weekGrid.querySelectorAll('.rem-delete').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const remId=btn.dataset.remId; const dateKey=btn.dataset.dateKey; removeWeekReminder(dateKey,remId); }); });
                document.addEventListener('click',(e)=>{ if(!e.target.closest('.color-picker-mini')&&!e.target.closest('.day-color-btn')){ document.querySelectorAll('.color-picker-mini.show').forEach(p=>p.classList.remove('show')); } },{once:true});
            }
            function addWeekReminder(dateKey,text,time){ const dayData=getDayData(dateKey); dayData.reminders.push({id:generateId(),text:text.trim(),time:time||null}); saveData(); renderWeekView(); }
            function removeWeekReminder(dateKey,remId){ const dayData=getDayData(dateKey); dayData.reminders=dayData.reminders.filter(r=>r.id!==remId); saveData(); renderWeekView(); }

            function updatePomodoroDisplay(){ const mins=Math.floor(pomoState.remainingSeconds/60); const secs=pomoState.remainingSeconds%60; $pomoTime.textContent=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0'); $pomoLabel.textContent=pomoState.isBreak?'Descanso':'Enfoque'; const progress=pomoState.remainingSeconds/pomoState.totalSeconds; const offset=CIRCUMFERENCE*(1-progress); $pomoProgress.setAttribute('stroke-dashoffset',offset); $pomoProgress.classList.toggle('break-mode',pomoState.isBreak); }
            function resetPomodoro(isBreak=false){ clearInterval(pomoState.intervalId); pomoState.isRunning=false; pomoState.isBreak=isBreak; pomoState.totalSeconds=isBreak?BREAK_MINUTES*60:WORK_MINUTES*60; pomoState.remainingSeconds=pomoState.totalSeconds; pomoState.intervalId=null; $btnPomoStart.textContent='▶'; updatePomodoroDisplay(); savePomodoroState(); }
            function togglePomodoro(){
                if(pomoState.isRunning){ clearInterval(pomoState.intervalId); pomoState.isRunning=false; pomoState.intervalId=null; $btnPomoStart.textContent='▶'; savePomodoroState(); }
                else {
                    if($cafeAudio.paused) $cafeAudio.play().catch(()=>{});
                    pomoState.isRunning=true; $btnPomoStart.textContent='⏸';
                    pomoState.intervalId=setInterval(()=>{ pomoState.remainingSeconds--; updatePomodoroDisplay(); if(pomoState.remainingSeconds<=0){ clearInterval(pomoState.intervalId); pomoState.isRunning=false; pomoState.intervalId=null; $btnPomoStart.textContent='▶'; if(!pomoState.isBreak){ showToast('🍅 ¡Pomodoro completado! Descanso de 5 min'); resetPomodoro(true); } else { showToast('☕ Descanso terminado. ¡A por otro!'); resetPomodoro(false); } savePomodoroState(); if('Notification' in window&&Notification.permission==='granted'){ new Notification('FlowPad',{body:pomoState.isBreak?'¡Descanso terminado!':'¡Pomodoro completado!',icon:'🧠'}); } } if(pomoState.remainingSeconds%15===0)savePomodoroState(); },1000);
                    savePomodoroState();
                }
            }
            function requestNotificationPermission(){ if('Notification' in window&&Notification.permission==='default') Notification.requestPermission(); }

            let audioActive=false;
            function toggleAmbientAudio(){
                if(audioActive){ $cafeAudio.pause(); audioActive=false; $btnNoise.classList.remove('active'); $btnNoise.innerHTML='🔇'; $noiseSlider.classList.remove('active'); showToast('🔇 Sonido ambiente desactivado'); }
                else { $cafeAudio.play().catch(()=>{ showToast('⚠️ No se pudo reproducir el audio',false); return; }); audioActive=true; $btnNoise.classList.add('active'); $btnNoise.innerHTML='🔊'; $noiseSlider.classList.add('active'); showToast('🔊 Sonido ambiente activado'); }
            }
            function setAudioVolume(val){ $cafeAudio.volume=val/100; }
            $cafeAudio.volume=0.3;
            $btnNoise.addEventListener('click',toggleAmbientAudio);
            $noiseSlider.addEventListener('input',()=>setAudioVolume(parseInt($noiseSlider.value)));

            // ==================== EXPORTACIÓN E IMPORTACIÓN ====================
            function generateExportText(){
                let t = 'FLOWPAD_DATA_V1\n';
                t += '# Formato editable. Puedes modificar este archivo y luego importarlo.\n';
                t += '# Las líneas que empiezan con # son comentarios y se ignoran.\n';
                t += '# [SECCION] indica el inicio de una sección.\n\n';

                // Notas
                t += '[NOTAS]\n';
                if(appData.pinnedNotes.length===0) t += '# (sin notas)\n';
                else appData.pinnedNotes.forEach(n => t += `- (color:${n.color||'lavender'}) ${n.text}\n`);

                // Tareas
                t += '\n[TAREAS:BRAIN_DUMP]\n';
                (appData.tasks['brain-dump']||[]).forEach(tk => t += `- ${tk.completed?'[x] ':''}${tk.text}\n`);
                if(!appData.tasks['brain-dump']?.length) t += '# (vacía)\n';

                t += '\n[TAREAS:FOCUS]\n';
                (appData.tasks['focus-today']||[]).forEach(tk => t += `- ${tk.completed?'[x] ':''}${tk.text}\n`);
                if(!appData.tasks['focus-today']?.length) t += '# (vacía)\n';

                t += '\n[TAREAS:DONE]\n';
                (appData.tasks['done']||[]).forEach(tk => t += `- [x] ${tk.text}\n`);
                if(!appData.tasks['done']?.length) t += '# (vacía)\n';

                // Semana
                t += '\n[SEMANA]\n';
                // Formato: fecha|color:color
                //          fecha|hh:mm|texto
                //          fecha|texto (sin hora)
                const allDates = new Set(Object.keys(appData.weekDays));
                // También incluir fechas sin datos para que estén visibles
                const weekDays = getWeekDays();
                weekDays.forEach(d => allDates.add(formatDateKey(d)));
                const sortedDates = Array.from(allDates).sort();
                let hasContent = false;
                sortedDates.forEach(dateKey => {
                    const dd = appData.weekDays[dateKey] || { color: null, reminders: [] };
                    if(dd.color){
                        t += `${dateKey}|color:${dd.color}\n`;
                        hasContent = true;
                    }
                    if(dd.reminders && dd.reminders.length>0){
                        dd.reminders.forEach(r => {
                            if(r.time){
                                t += `${dateKey}|${r.time}|${r.text}\n`;
                            } else {
                                t += `${dateKey}|${r.text}\n`;
                            }
                            hasContent = true;
                        });
                    }
                });
                if(!hasContent) t += '# (sin recordatorios)\n';

                t += '\n# Fin del archivo FlowPad\n';
                return t;
            }

            function downloadExportTxt(){
                const text = generateExportText();
                const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'flowpad-datos-' + new Date().toISOString().slice(0,10) + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('💾 Datos exportados correctamente');
            }

            function parseImportText(text){
                const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
                const result = {
                    pinnedNotes: [],
                    tasks: { 'brain-dump': [], 'focus-today': [], 'done': [] },
                    weekDays: {}
                };
                let currentSection = null;
                const sectionMap = {
                    '[NOTAS]': 'notes',
                    '[TAREAS:BRAIN_DUMP]': 'brain',
                    '[TAREAS:FOCUS]': 'focus',
                    '[TAREAS:DONE]': 'done',
                    '[SEMANA]': 'week'
                };

                for(const line of lines){
                    if(line.startsWith('[') && line.endsWith(']')){
                        currentSection = sectionMap[line] || null;
                        continue;
                    }
                    if(!currentSection) continue;

                    if(currentSection === 'notes'){
                        // Formato: - (color:lavender) Texto de la nota
                        const match = line.match(/^-\s*\(color:(\w+)\)\s+(.+)$/);
                        if(match){
                            result.pinnedNotes.push({
                                id: generateId(),
                                text: match[2].trim(),
                                color: COLORS.includes(match[1]) ? match[1] : 'lavender',
                                createdAt: new Date().toISOString()
                            });
                        }
                    } else if(currentSection === 'brain' || currentSection === 'focus' || currentSection === 'done'){
                        const colKey = currentSection === 'brain' ? 'brain-dump' : (currentSection === 'focus' ? 'focus-today' : 'done');
                        // Formato: - [x] Tarea completada  o  - Tarea normal
                        let completed = false;
                        let taskText = line;
                        if(line.startsWith('- [x] ') || line.startsWith('- [X] ')){
                            completed = true;
                            taskText = line.substring(6).trim();
                        } else if(line.startsWith('- ')){
                            taskText = line.substring(2).trim();
                        }
                        if(taskText){
                            result.tasks[colKey].push({
                                id: generateId(),
                                text: taskText,
                                completed: completed,
                                createdAt: new Date().toISOString()
                            });
                        }
                    } else if(currentSection === 'week'){
                        // Formatos: fecha|color:color  o  fecha|hh:mm|texto  o  fecha|texto
                        const parts = line.split('|');
                        if(parts.length >= 2){
                            const dateKey = parts[0].trim();
                            if(!result.weekDays[dateKey]) result.weekDays[dateKey] = { color: null, reminders: [] };
                            if(parts[1].startsWith('color:')){
                                const color = parts[1].substring(6).trim();
                                if(COLORS.includes(color)){
                                    result.weekDays[dateKey].color = color;
                                }
                            } else if(parts.length >= 3){
                                // Tiene hora
                                const time = parts[1].trim();
                                const reminderText = parts.slice(2).join('|').trim();
                                result.weekDays[dateKey].reminders.push({
                                    id: generateId(),
                                    text: reminderText,
                                    time: time
                                });
                            } else {
                                // Solo texto, sin hora
                                const reminderText = parts[1].trim();
                                result.weekDays[dateKey].reminders.push({
                                    id: generateId(),
                                    text: reminderText,
                                    time: null
                                });
                            }
                        }
                    }
                }
                return result;
            }

            function importDataFromText(text){
                try {
                    const parsed = parseImportText(text);
                    // Preguntar si quiere reemplazar o agregar
                    showConfirm('¿Quieres REEMPLAZAR todos los datos actuales con el archivo importado? (Si cancelas, se AGREGARÁN los datos sin borrar los existentes)', () => {
                        // Reemplazar
                        appData.pinnedNotes = parsed.pinnedNotes;
                        appData.tasks = parsed.tasks;
                        appData.weekDays = parsed.weekDays;
                        saveData();
                        renderAllKanban();
                        renderPinnedNotes();
                        renderWeekView();
                        showToast('✅ Datos reemplazados correctamente');
                    }, () => {
                        // Agregar (merge)
                        // Notas: agregar las que no existan por texto
                        parsed.pinnedNotes.forEach(n => {
                            if(!appData.pinnedNotes.some(ex => ex.text === n.text)){
                                appData.pinnedNotes.push(n);
                            }
                        });
                        // Tareas: agregar a cada columna las que no existan
                        for(const col of ['brain-dump','focus-today','done']){
                            parsed.tasks[col].forEach(t => {
                                if(!appData.tasks[col].some(ex => ex.text === t.text)){
                                    appData.tasks[col].push(t);
                                }
                            });
                        }
                        // Semana: merge profundo
                        for(const dateKey in parsed.weekDays){
                            if(!appData.weekDays[dateKey]) appData.weekDays[dateKey] = { color: null, reminders: [] };
                            const src = parsed.weekDays[dateKey];
                            if(src.color) appData.weekDays[dateKey].color = src.color;
                            src.reminders.forEach(r => {
                                if(!appData.weekDays[dateKey].reminders.some(ex => ex.text === r.text && ex.time === r.time)){
                                    appData.weekDays[dateKey].reminders.push(r);
                                }
                            });
                        }
                        saveData();
                        renderAllKanban();
                        renderPinnedNotes();
                        renderWeekView();
                        showToast('✅ Datos agregados correctamente');
                    });
                } catch(e){
                    showToast('❌ Error al parsear el archivo. Verifica el formato.', false);
                    console.error(e);
                }
            }

            function handleFileImport(file){
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    importDataFromText(text);
                };
                reader.onerror = () => showToast('❌ Error al leer el archivo', false);
                reader.readAsText(file);
            }

            // Modificar showConfirm para aceptar callback de cancelación
            const originalShowConfirm = showConfirm;
            showConfirm = function(msg, onYes, onNo){
                $confirmMessage.textContent = msg;
                $confirmOverlay.style.display = 'flex';
                confirmCallback = onYes;
                // Guardar callback de cancelación
                $confirmOverlay._onCancel = onNo || null;
            };
            document.getElementById('btnConfirmNo').addEventListener('click', ()=>{
                const onCancel = $confirmOverlay._onCancel;
                hideConfirm();
                if(onCancel) onCancel();
            });
            $confirmOverlay.addEventListener('click', (e)=>{
                if(e.target === $confirmOverlay){
                    const onCancel = $confirmOverlay._onCancel;
                    hideConfirm();
                    if(onCancel) onCancel();
                }
            });

            // Resumen legible (copiar al portapapeles)
            function generateSummaryText(){
                let t='📋 RESUMEN FLOWPAD\n'+'═'.repeat(40)+'\n\n';
                t+='📌 NOTAS FIJADAS:\n'; if(appData.pinnedNotes.length===0)t+='  (ninguna)\n'; else appData.pinnedNotes.forEach((n,i)=>t+=`  ${i+1}. ${n.text}\n`);
                t+='\n📥 DESCARGA MENTAL:\n'; (appData.tasks['brain-dump']||[]).forEach((tk,i)=>t+=`  ${i+1}. [${tk.completed?'✓':' '}] ${tk.text}\n`); if(!appData.tasks['brain-dump']?.length)t+='  (vacía)\n';
                t+='\n🎯 FOCO DE HOY:\n'; (appData.tasks['focus-today']||[]).forEach((tk,i)=>t+=`  ${i+1}. [${tk.completed?'✓':' '}] ${tk.text}\n`); if(!appData.tasks['focus-today']?.length)t+='  (vacía)\n';
                t+='\n✅ HECHO:\n'; (appData.tasks['done']||[]).forEach((tk,i)=>t+=`  ${i+1}. ✓ ${tk.text}\n`); if(!appData.tasks['done']?.length)t+='  (vacía)\n';
                t+='\n📅 RECORDATORIOS DE LA SEMANA:\n'; const days=getWeekDays(); const dn=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
                days.forEach((day,i)=>{ const dk=formatDateKey(day); const dd=getDayData(dk); if(dd.reminders.length>0||dd.color){ t+=`  ${dn[i]} ${day.getDate()}/${day.getMonth()+1}${dd.color?' ['+dd.color+']':''}:\n`; dd.reminders.forEach(r=>{ t+=`    · ${r.time?r.time+' ':''}${r.text}\n`; }); } });
                if(days.every(d=>!getDayData(formatDateKey(d)).reminders.length&&!getDayData(formatDateKey(d)).color))t+='  (sin recordatorios esta semana)\n';
                t+='\n'+'═'.repeat(40)+'\nExportado desde FlowPad · '+new Date().toLocaleString()+'\n'; return t;
            }
            function copyToClipboard(){ navigator.clipboard.writeText(generateSummaryText()).then(()=>showToast('📋 Resumen copiado')).catch(()=>showToast('⚠️ No se pudo copiar',false)); }
            function clearDoneColumn(){ showConfirm('¿Limpiar TODA la columna "Hecho"?',()=>{ appData.tasks['done']=[]; saveData(); renderKanbanColumn('done'); showToast('🧹 Columna limpiada'); }); }

            $brainInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); const text=$brainInput.value.trim(); if(text){ addTask(text,'brain-dump'); $brainInput.value=''; showToast('📥 Agregado a Descarga Mental'); } } });
            document.getElementById('btnAddNote').addEventListener('click',openNoteModal);
            $btnPomoStart.addEventListener('click',togglePomodoro);
            $btnPomoReset.addEventListener('click',()=>{ resetPomodoro(pomoState.isBreak); showToast('🔄 Reiniciado'); });
            document.getElementById('btnPrevWeek').addEventListener('click',()=>{ currentWeekOffset--; renderWeekView(); });
            document.getElementById('btnNextWeek').addEventListener('click',()=>{ currentWeekOffset++; renderWeekView(); });
            document.getElementById('btnTodayWeek').addEventListener('click',()=>{ currentWeekOffset=0; renderWeekView(); });
            document.getElementById('btnCopyClipboard').addEventListener('click',copyToClipboard);
            document.getElementById('btnDownloadTxt').addEventListener('click',downloadExportTxt);
            document.getElementById('btnImportTxt').addEventListener('click',()=>$importFileInput.click());
            $importFileInput.addEventListener('change',(e)=>{ if(e.target.files.length>0){ handleFileImport(e.target.files[0]); $importFileInput.value=''; } });
            document.getElementById('btnClearDone').addEventListener('click',clearDoneColumn);
            document.addEventListener('keydown',(e)=>{ if(e.ctrlKey&&e.shiftKey&&e.key==='N'){ e.preventDefault(); openNoteModal(); } if(e.ctrlKey&&e.shiftKey&&e.key==='P'){ e.preventDefault(); togglePomodoro(); } });

            function init(){
                loadData(); loadPomodoroState(); updateWeekStartDate(); renderAllKanban(); renderPinnedNotes(); renderWeekView(); updatePomodoroDisplay();
                if(!pomoState.isRunning)$btnPomoStart.textContent='▶'; else { resetPomodoro(pomoState.isBreak); }
                setAudioVolume(parseInt($noiseSlider.value));
                requestNotificationPermission();
                console.log('🌊 FlowPad v4 · Importación/Exportación de datos');
                console.log('  Exporta tus datos como .txt editable, modifícalos y vuelve a importarlos.');
                console.log('  Ctrl+Shift+N → Nueva nota | Ctrl+Shift+P → Pomodoro');
                console.log('  Para reiniciar: localStorage.clear(); location.reload();');
            }
            init();
            window.flowPad = { appData, resetAll: () => { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(POMODORO_KEY); location.reload(); }, getData: () => appData, saveData, exportText: generateExportText, importText: importDataFromText };
        })();
    </script>

      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('FlowPad PWA Activa ✅'))
        .catch(err => console.log('Error al registrar PWA ❌', err));
    });

</script>
